syntax = "proto3";

package notification.service.v1;

import "errors/errors.proto";

enum NotificationErrorReason {
  option (errors.default_code) = 500;

  // 400 - Bad Request
  BAD_REQUEST = 0 [(errors.code) = 400];
  INVALID_CHANNEL_TYPE = 1 [(errors.code) = 400];
  INVALID_TEMPLATE = 2 [(errors.code) = 400];
  INVALID_RECIPIENT = 3 [(errors.code) = 400];
  INVALID_CHANNEL_CONFIG = 4 [(errors.code) = 400];

  // 403 - Forbidden
  ACCESS_DENIED = 100 [(errors.code) = 403];
  PERMISSION_ALREADY_EXISTS = 101 [(errors.code) = 409];

  // 404 - Not Found
  NOT_FOUND = 400 [(errors.code) = 404];
  CHANNEL_NOT_FOUND = 401 [(errors.code) = 404];
  TEMPLATE_NOT_FOUND = 402 [(errors.code) = 404];
  NOTIFICATION_NOT_FOUND = 403 [(errors.code) = 404];

  // 409 - Conflict
  CHANNEL_ALREADY_EXISTS = 900 [(errors.code) = 409];
  TEMPLATE_ALREADY_EXISTS = 901 [(errors.code) = 409];

  // 500 - Internal Server Error
  INTERNAL_SERVER_ERROR = 2000 [(errors.code) = 500];
  SEND_FAILED = 2001 [(errors.code) = 500];
  RENDER_FAILED = 2002 [(errors.code) = 500];
  DATABASE_ERROR = 2003 [(errors.code) = 500];

  // 503 - Service Unavailable
  SERVICE_UNAVAILABLE = 2300 [(errors.code) = 503];
  CHANNEL_DISABLED = 2301 [(errors.code) = 503];
}
