syntax = "proto3";

package notification.service.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

// Permission Service - Zanzibar-like authorization for notification resources (templates, channels)
service NotificationPermissionService {
  // Grant access to a resource (template or channel)
  rpc GrantAccess(GrantAccessRequest) returns (GrantAccessResponse) {
    option (google.api.http) = {
      post: "/v1/permissions"
      body: "*"
    };
  }

  // Revoke access from a resource
  rpc RevokeAccess(RevokeAccessRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/v1/permissions"
    };
  }

  // List permissions on a resource
  rpc ListPermissions(ListPermissionsRequest) returns (ListPermissionsResponse) {
    option (google.api.http) = {
      get: "/v1/permissions"
    };
  }

  // Check if a subject has access to a resource
  rpc CheckAccess(CheckAccessRequest) returns (CheckAccessResponse) {
    option (google.api.http) = {
      post: "/v1/permissions/check"
      body: "*"
    };
  }

  // Get effective permissions for a subject on a resource
  rpc GetEffectivePermissions(GetEffectivePermissionsRequest) returns (GetEffectivePermissionsResponse) {
    option (google.api.http) = {
      get: "/v1/permissions/effective"
    };
  }
}

// Resource type
enum ResourceType {
  RESOURCE_TYPE_UNSPECIFIED = 0;
  RESOURCE_TYPE_TEMPLATE = 1;
  RESOURCE_TYPE_CHANNEL = 2;
}

// Relation (permission level)
enum Relation {
  RELATION_UNSPECIFIED = 0;
  RELATION_OWNER = 1;   // Full control: read, write, share, delete, use
  RELATION_EDITOR = 2;  // Modify: read, write, use
  RELATION_VIEWER = 3;  // Read-only: read
  RELATION_SHARER = 4;  // Can share: read, share, use
}

// Subject type
enum SubjectType {
  SUBJECT_TYPE_UNSPECIFIED = 0;
  SUBJECT_TYPE_USER = 1;
  SUBJECT_TYPE_ROLE = 2;
  SUBJECT_TYPE_CLIENT = 3; // mTLS client identity (e.g. "sharing", "deployer")
}

// Permission action that can be checked
enum PermissionAction {
  PERMISSION_ACTION_UNSPECIFIED = 0;
  PERMISSION_ACTION_READ = 1;
  PERMISSION_ACTION_WRITE = 2;
  PERMISSION_ACTION_DELETE = 3;
  PERMISSION_ACTION_SHARE = 4;
  PERMISSION_ACTION_USE = 5;
}

// Permission tuple entity
message NotificationPermission {
  uint32 id = 1 [json_name = "id"];
  uint32 tenant_id = 2 [json_name = "tenantId"];
  ResourceType resource_type = 3 [json_name = "resourceType"];
  string resource_id = 4 [json_name = "resourceId"];
  Relation relation = 5 [json_name = "relation"];
  SubjectType subject_type = 6 [json_name = "subjectType"];
  string subject_id = 7 [json_name = "subjectId"];
  optional uint32 granted_by = 8 [json_name = "grantedBy"];
  optional google.protobuf.Timestamp expires_at = 9 [json_name = "expiresAt"];
  google.protobuf.Timestamp create_time = 10 [json_name = "createTime"];
}

// Request to grant access to a resource (template or channel)
message GrantAccessRequest {
  // Resource type (template or channel)
  ResourceType resource_type = 1 [
    json_name = "resourceType",
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).enum = {defined_only: true, not_in: [0]}
  ];

  // Resource ID (UUID)
  string resource_id = 2 [
    json_name = "resourceId",
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).string = {
      min_len: 1
      max_len: 36
      pattern: "^[a-fA-F0-9\\-]+$"
    }
  ];

  // Relation to grant
  Relation relation = 3 [
    json_name = "relation",
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).enum = {defined_only: true, not_in: [0]}
  ];

  // Subject type
  SubjectType subject_type = 4 [
    json_name = "subjectType",
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).enum = {defined_only: true, not_in: [0]}
  ];

  // Subject ID (user ID, role ID, mTLS client name, or "*" for all clients)
  string subject_id = 5 [
    json_name = "subjectId",
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).string = {
      min_len: 1
      max_len: 255
    }
  ];

  // Optional expiration time
  optional google.protobuf.Timestamp expires_at = 6 [json_name = "expiresAt"];
}

message GrantAccessResponse {
  NotificationPermission permission = 1 [json_name = "permission"];
}

// Request to revoke access from a resource
message RevokeAccessRequest {
  // Resource type
  ResourceType resource_type = 1 [
    json_name = "resourceType",
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).enum = {defined_only: true, not_in: [0]}
  ];

  // Resource ID
  string resource_id = 2 [
    json_name = "resourceId",
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).string = {
      min_len: 1
      max_len: 36
      pattern: "^[a-fA-F0-9\\-]+$"
    }
  ];

  // Subject type
  SubjectType subject_type = 3 [
    json_name = "subjectType",
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).enum = {defined_only: true, not_in: [0]}
  ];

  // Subject ID
  string subject_id = 4 [
    json_name = "subjectId",
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).string = {
      min_len: 1
      max_len: 255
    }
  ];

  // Relation to revoke (optional - if not specified, revokes all)
  optional Relation relation = 5 [json_name = "relation"];
}

// Request to list permissions on a resource
message ListPermissionsRequest {
  // Resource type
  ResourceType resource_type = 1 [
    json_name = "resourceType",
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).enum = {defined_only: true, not_in: [0]}
  ];

  // Resource ID
  string resource_id = 2 [
    json_name = "resourceId",
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).string = {
      min_len: 1
      max_len: 36
      pattern: "^[a-fA-F0-9\\-]+$"
    }
  ];

  // Subject type (optional - filter by subject type)
  optional SubjectType subject_type = 3 [json_name = "subjectType"];

  // Subject ID (optional - filter by specific subject)
  optional string subject_id = 4 [
    json_name = "subjectId",
    (buf.validate.field).string = {max_len: 255}
  ];

  // Pagination
  optional uint32 page = 5 [json_name = "page"];
  optional uint32 page_size = 6 [json_name = "pageSize"];
}

message ListPermissionsResponse {
  repeated NotificationPermission permissions = 1 [json_name = "permissions"];
  uint32 total = 2 [json_name = "total"];
}

// Request to check access on a resource
message CheckAccessRequest {
  // Resource type
  ResourceType resource_type = 1 [
    json_name = "resourceType",
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).enum = {defined_only: true, not_in: [0]}
  ];

  // Resource ID
  string resource_id = 2 [
    json_name = "resourceId",
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).string = {
      min_len: 1
      max_len: 36
      pattern: "^[a-fA-F0-9\\-]+$"
    }
  ];

  // Subject type
  SubjectType subject_type = 3 [
    json_name = "subjectType",
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).enum = {defined_only: true, not_in: [0]}
  ];

  // Subject ID
  string subject_id = 4 [
    json_name = "subjectId",
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).string = {
      min_len: 1
      max_len: 255
    }
  ];

  // Permission action to check
  PermissionAction permission = 5 [
    json_name = "permission",
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).enum = {defined_only: true, not_in: [0]}
  ];
}

message CheckAccessResponse {
  bool allowed = 1 [json_name = "allowed"];
  Relation relation = 2 [json_name = "relation"];
  string reason = 3 [json_name = "reason"];
}

// Request to get effective permissions on a resource
message GetEffectivePermissionsRequest {
  // Resource type
  ResourceType resource_type = 1 [
    json_name = "resourceType",
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).enum = {defined_only: true, not_in: [0]}
  ];

  // Resource ID
  string resource_id = 2 [
    json_name = "resourceId",
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).string = {
      min_len: 1
      max_len: 36
      pattern: "^[a-fA-F0-9\\-]+$"
    }
  ];

  // Subject type
  SubjectType subject_type = 3 [
    json_name = "subjectType",
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).enum = {defined_only: true, not_in: [0]}
  ];

  // Subject ID
  string subject_id = 4 [
    json_name = "subjectId",
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).string = {
      min_len: 1
      max_len: 255
    }
  ];
}

message GetEffectivePermissionsResponse {
  repeated PermissionAction permissions = 1 [json_name = "permissions"];
  Relation highest_relation = 2 [json_name = "highestRelation"];
}
