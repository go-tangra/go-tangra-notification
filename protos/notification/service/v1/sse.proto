syntax = "proto3";

package notification.service.v1;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";

// SSE Event Publishing Service
service NotificationSSEService {
  // Publish an event to a user's SSE stream
  rpc PublishEvent(PublishEventRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/v1/sse/publish"
      body: "*"
    };
  }

  // Publish an event to multiple users
  rpc PublishBulkEvent(PublishBulkEventRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/v1/sse/publish-bulk"
      body: "*"
    };
  }
}

message PublishEventRequest {
  uint32 user_id = 1;   // target user
  string event_type = 2; // e.g. "notification"
  string data = 3;       // JSON payload
}

message PublishBulkEventRequest {
  repeated uint32 user_ids = 1;
  string event_type = 2;
  string data = 3;
}
